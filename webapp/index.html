<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Processing Pipeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <p class="institute">ITS-ICT Piemonte — BAD 26</p>
    <h1>Order Processing Pipeline</h1>
    <p class="subtitle">Event-Driven con SMS Confirmation</p>
  </div>
</header>

<div class="container">
  <div id="form-section" class="panel">
    <h2>Nuovo Ordine</h2>
    <form id="order-form" novalidate>
      <div class="form-group">
        <label for="customerName">Nome Cliente *</label>
        <input type="text" id="customerName" required minlength="1" maxlength="100" placeholder="Mario Rossi">
      </div>

      <div class="form-group">
        <label for="customerPhone">Telefono * <span class="hint">(+39, +351, ecc.)</span></label>
        <input type="tel" id="customerPhone" required pattern="^\+?[1-9]\d{6,14}$" placeholder="+351911234567">
      </div>

      <div class="form-group">
        <label>Articoli *</label>
        <div id="items-container">
          <div class="item-row">
            <input type="text" class="item-id" placeholder="Codice" required>
            <input type="text" class="item-name" placeholder="Nome articolo" required>
            <input type="number" class="item-qty" placeholder="Qt" min="1" max="999" required>
            <input type="number" class="item-price" placeholder="Prezzo" min="0" step="0.01" required>
            <button type="button" class="btn-remove-item" title="Rimuovi">&times;</button>
          </div>
        </div>
        <button type="button" id="add-item" class="btn-link">+ Aggiungi articolo</button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="total">Totale € *</label>
          <input type="number" id="total" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="tax">IVA € *</label>
          <input type="number" id="tax" min="0" step="0.01" required>
        </div>
      </div>

      <div class="form-group">
        <label for="notes">Note</label>
        <textarea id="notes" maxlength="500" rows="2" placeholder="Eventuali note sull'ordine"></textarea>
      </div>

      <button type="submit" id="btn-submit" class="btn-primary">Invia Ordine</button>
    </form>
    <div id="form-error" class="alert alert-error hidden"></div>
  </div>

  <div id="dashboard-section" class="panel hidden">
    <div class="dash-header">
      <h2>Stato Ordine</h2>
      <span id="dash-order-label" class="order-label"></span>
    </div>

    <div class="status-row">
      <span id="dash-status-badge" class="status-badge"></span>
      <span id="dash-timer" class="timer hidden"></span>
    </div>

    <div class="progress-bar" id="dash-progress">
      <div class="progress-fill"></div>
    </div>

    <h3>Timeline</h3>
    <ul class="stepper" id="dash-stepper"></ul>

    <button id="btn-confirm" class="btn-confirm hidden">Conferma Ordine</button>
    <button id="btn-new-order" class="btn-link hidden">+ Nuovo Ordine</button>
  </div>
</div>

<footer>
  <p>ITS-ICT Piemonte — BAD 26, Cloud Services — Microsoft Azure</p>
  <p>Event-Driven Order Processing Pipeline &mdash; <span id="footer-status">Pronto</span></p>
</footer>

<script src="app.js"></script>
</body>
</html>
