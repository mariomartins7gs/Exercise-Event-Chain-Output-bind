name: Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suffix:
        description: 'Deployment suffix'
        default: '001'
        type: string
      skip-infra:
        description: 'Skip Bicep deployment'
        default: false
        type: boolean

env:
  SUFFIX: ${{ inputs.suffix || vars.SUFFIX || '001' }}
  PREFIX: ${{ vars.PREFIX || 'order' }}
  AZURE_RG: rg-orderprocessing-${{ inputs.suffix || vars.SUFFIX || '001' }}
  PYTHON_VERSION: '3.11'

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install flake8 black
      - run: flake8 src/
      - run: black --check src/ --line-length 79

  test:
    needs: lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov pytest-asyncio
      - run: pytest test/ --cov=src --cov-report=xml --junitxml=test-results.xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: test-results.xml

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p deployment
          cp -r src/. deployment/
          cp host.json deployment/
          cp requirements.txt deployment/
      - run: |
          cd deployment
          pip install -r requirements.txt -t . 2>&1 | tail -5
          zip -r ../function-app.zip .
      - run: echo "ZIP size $(du -sh ../function-app.zip | cut -f1)"
      - uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: function-app.zip
          retention-days: 1

  deploy-infra:
    needs: build
    if: github.ref == 'refs/heads/main' && !inputs.skip-infra
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Create or update resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RG }} \
            --location germanywestcentral \
            --output none
      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          deploymentName: deploy-${{ github.run_id }}-${{ github.run_attempt }}
          resourceGroupName: ${{ env.AZURE_RG }}
          template: infra/main.bicep
          parameters: >
            location=germanywestcentral
            suffix=${{ env.SUFFIX }}
            prefix=${{ env.PREFIX }}
            enableFreeTier=false
          failOnStdErr: false
      - name: Save infra outputs
        run: |
          az deployment group show \
            --resource-group ${{ env.AZURE_RG }} \
            --name deploy-${{ github.run_id }}-${{ github.run_attempt }} \
            --query properties.outputs \
            -o json > infra-outputs.json
          cat infra-outputs.json
      - uses: actions/upload-artifact@v4
        with:
          name: infra-outputs
          path: infra-outputs.json
          retention-days: 1

  deploy-functions:
    needs: [build, deploy-infra]
    if: github.ref == 'refs/heads/main' && !cancelled()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: function-app
      - uses: actions/download-artifact@v4
        with:
          name: infra-outputs
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Function App (Run from Package)
        run: |
          FUNC_NAME=$(jq -r '.functionAppName.value' infra-outputs.json)
          STORAGE=$(jq -r '.storageAccountName.value' infra-outputs.json)
          RG=${{ env.AZURE_RG }}

          CONTAINER="deploy-packages"
          az storage container create \
            --account-name "$STORAGE" \
            --auth-mode login \
            --name "$CONTAINER" \
            --output none

          BLOB_NAME="func-$(date +%s).zip"
          az storage blob upload \
            --account-name "$STORAGE" \
            --auth-mode login \
            --container-name "$CONTAINER" \
            --file function-app.zip \
            --name "$BLOB_NAME" \
            --output none

          SAS=$(az storage blob generate-sas \
            --account-name "$STORAGE" \
            --auth-mode login \
            --as-user \
            --container-name "$CONTAINER" \
            --name "$BLOB_NAME" \
            --permissions r \
            --expiry $(date -u -d "+1 hour" '+%Y-%m-%dT%H:%MZ') \
            --output tsv)

          PACKAGE_URL="https://$STORAGE.blob.core.windows.net/$CONTAINER/$BLOB_NAME?$SAS"
          az functionapp config appsettings set \
            --name "$FUNC_NAME" \
            --resource-group "$RG" \
            --settings "WEBSITE_RUN_FROM_PACKAGE=$PACKAGE_URL" \
            --output none

          echo "Restarting function app to pick up new package..."
          az functionapp restart --name "$FUNC_NAME" --resource-group "$RG" --output none

          echo "Deployed via RUN_FROM_PACKAGE. Waiting for function app to start and sync..."
          sleep 90
      - name: Create Event Grid subscription
        run: |
          FUNC_NAME=$(jq -r '.functionAppName.value' infra-outputs.json)
          FUNC_ID=$(jq -r '.functionAppId.value' infra-outputs.json)
          TOPIC_NAME=$(jq -r '.systemTopicName.value' infra-outputs.json)
          RG=${{ env.AZURE_RG }}

          echo "Function app: $FUNC_NAME"
          STATE=$(az functionapp show -n "$FUNC_NAME" -g "$RG" --query "state" -o tsv 2>/dev/null)
          echo "State: $STATE"

          for i in $(seq 1 6); do
            KEY=$(az functionapp keys list \
              --name "$FUNC_NAME" \
              --resource-group "$RG" \
              --query "systemKeys.eventgrid_extension" \
              --output tsv 2>/dev/null)
            if [ -n "$KEY" ] && [ "$KEY" != "null" ]; then
              echo "Event grid key obtained after ${i} attempt(s)"
              break
            fi
            echo "Waiting for event grid extension key (attempt $i)..."
            sleep 15
          done

          if [ -n "$KEY" ] && [ "$KEY" != "null" ]; then
            ENDPOINT="https://$FUNC_NAME.azurewebsites.net/runtime/webhooks/EventGridExtensionConfig?functionName=order_validator&code=$KEY"
            az eventgrid system-topic event-subscription create \
              --name "blob-created-sub" \
              --resource-group "$RG" \
              --system-topic-name "$TOPIC_NAME" \
              --endpoint-type webhook \
              --endpoint "$ENDPOINT" \
              --included-event-types Microsoft.Storage.BlobCreated \
              --subject-begins-with "/blobServices/default/containers/orders-inbox/" \
              --max-delivery-attempts 3 \
              --event-ttl 5
          else
            echo "Webhook endpoint key not available, falling back to AzureFunction endpoint type..."
            az eventgrid system-topic event-subscription create \
              --name "blob-created-sub" \
              --resource-group "$RG" \
              --system-topic-name "$TOPIC_NAME" \
              --endpoint-type azurefunction \
              --endpoint "$FUNC_ID" \
              --included-event-types Microsoft.Storage.BlobCreated \
              --subject-begins-with "/blobServices/default/containers/orders-inbox/" \
              --max-delivery-attempts 3 \
              --event-ttl 5
          fi

  deploy-webapp:
    needs: [build, deploy-infra]
    if: github.ref == 'refs/heads/main' && !cancelled()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: infra-outputs
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Enable static website
        run: |
          STORAGE=$(jq -r '.storageAccountName.value' infra-outputs.json)
          az storage blob service-properties update \
            --account-name "$STORAGE" \
            --auth-mode login \
            --static-website \
            --index-document index.html \
            --404-document index.html
      - name: Upload webapp to static site
        run: |
          STORAGE=$(jq -r '.storageAccountName.value' infra-outputs.json)
          az storage blob upload-batch \
            --account-name "$STORAGE" \
            --auth-mode login \
            --destination '$web' \
            --source webapp/ \
            --overwrite
